# ═══════════════════════════════════════════════════════════════
# M5 Platform - 性能基准测试基线 (Performance Baseline)
# ═══════════════════════════════════════════════════════════════
# 版本: v1.0.0
# 更新日期: 2026-07-16
# 适用范围: V17 生产环境验收

metadata:
  name: M5-Performance-Baseline
  version: "1.0.0"
  environment: production
  created_at: "2026-07-16T00:00:00Z"

# ═══════════════════════════════════════════════════════════════
# 1. API 延迟基线 (单位: 毫秒)
# ═══════════════════════════════════════════════════════════════
api_latency:
  description: "API 响应时间基线指标"
  endpoints:
    # 核心接口
    - name: "健康检查"
      path: "/api/v1/health/ping"
      method: "GET"
      p50: 10
      p95: 25
      p99: 50
      max: 100
      
    - name: "用户登录"
      path: "/api/v1/auth/login"
      method: "POST"
      p50: 50
      p95: 150
      p99: 300
      max: 500
      
    - name: "获取用户信息"
      path: "/api/v1/users/me"
      method: "GET"
      p50: 30
      p95: 80
      p99: 150
      max: 300
      
    # 业务接口 - 营销券
    - name: "查询优惠券列表"
      path: "/api/v1/coupons"
      method: "GET"
      p50: 40
      p95: 100
      p99: 200
      max: 400
      
    - name: "领取优惠券"
      path: "/api/v1/coupons/:id/claim"
      method: "POST"
      p50: 80
      p95: 200
      p99: 400
      max: 800
      
    - name: "核销优惠券"
      path: "/api/v1/coupons/redeem"
      method: "POST"
      p50: 60
      p95: 150
      p99: 300
      max: 600
      
    # 业务接口 - 物流
    - name: "创建巡检任务"
      path: "/api/v1/logistics/inspections"
      method: "POST"
      p50: 50
      p95: 120
      p99: 250
      max: 500
      
    - name: "查询巡检列表"
      path: "/api/v1/logistics/inspections"
      method: "GET"
      p50: 40
      p95: 100
      p99: 200
      max: 400

# ═══════════════════════════════════════════════════════════════
# 2. 吞吐量基线 (RPS - Requests Per Second)
# ═══════════════════════════════════════════════════════════════
throughput:
  description: "系统吞吐量基线"
  scenarios:
    - name: "常规负载"
      concurrent_users: 100
      target_rps: 1000
      duration: 60
      error_rate_threshold: 0.01
      
    - name: "峰值负载"
      concurrent_users: 500
      target_rps: 5000
      duration: 60
      error_rate_threshold: 0.05
      
    - name: "压力测试"
      concurrent_users: 1000
      target_rps: 10000
      duration: 30
      error_rate_threshold: 0.10
      
    - name: "稳定性测试"
      concurrent_users: 200
      target_rps: 2000
      duration: 3600
      error_rate_threshold: 0.001

# ═══════════════════════════════════════════════════════════════
# 3. 资源使用基线
# ═══════════════════════════════════════════════════════════════
resource_usage:
  description: "系统资源使用基线"
  thresholds:
    # CPU
    cpu:
      idle: 20
      normal: 50
      warning: 70
      critical: 90
      
    # 内存
    memory:
      idle: 30
      normal: 60
      warning: 80
      critical: 95
      
    # 磁盘
    disk:
      idle: 40
      normal: 60
      warning: 80
      critical: 90
      
    # 网络
    network:
      idle: 10
      normal: 50
      warning: 80
      critical: 95

# ═══════════════════════════════════════════════════════════════
# 4. 数据库性能基线
# ═══════════════════════════════════════════════════════════════
database:
  description: "数据库性能基线"
  query_performance:
    simple_query: 10
    moderate_query: 50
    complex_query: 200
    max_acceptable: 1000
    
  connection_pool:
    min_connections: 5
    max_connections: 50
    idle_timeout: 300
    
  transaction_rate:
    target_tps: 1000
    max_tps: 5000

# ═══════════════════════════════════════════════════════════════
# 5. 缓存性能基线
# ═══════════════════════════════════════════════════════════════
cache:
  description: "缓存性能基线"
  latency:
    l1_hit: 0.1
    l2_hit: 1
    l3_hit: 10
    miss: 50
    
  hit_rate:
    l1_target: 0.80
    l2_target: 0.15
    l3_target: 0.04
    overall_target: 0.99
    
  throughput:
    max_operations_per_second: 100000

# ═══════════════════════════════════════════════════════════════
# 6. 验收标准
# ═══════════════════════════════════════════════════════════════
acceptance_criteria:
  description: "性能验收标准"
  
  must_meet:
    - "API P95 延迟 < 200ms"
    - "API P99 延迟 < 500ms"
    - "常规负载 RPS >= 1000"
    - "错误率 < 1%"
    - "CPU 使用率 < 70%"
    - "内存使用率 < 80%"
    
  should_meet:
    - "API P95 延迟 < 100ms"
    - "API P99 延迟 < 200ms"
    - "峰值负载 RPS >= 5000"
    - "错误率 < 0.1%"
    - "缓存命中率 > 95%"
    
  nice_to_have:
    - "API P95 延迟 < 50ms"
    - "压力测试 RPS >= 10000"
    - "错误率 < 0.01%"
    - "缓存命中率 > 99%"
