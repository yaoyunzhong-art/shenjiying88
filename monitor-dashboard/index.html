<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=pages/dashboard.html">
  <title>正在跳转...</title>
  <style>
    body {
      background: #0a0a0f;
      color: #e0e0ff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .loading {
      text-align: center;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid #2a2a3a;
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 {
      font-size: 24px;
      font-weight: 500;
      margin: 0 0 10px;
    }
    p {
      color: #8888a0;
      margin: 0;
    }
    a {
      color: #00d4ff;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <h1>Monitor Pro</h1>
    <p>正在加载监控平台...</p>
    <p style="margin-top: 20px; font-size: 14px;">
      如果没有自动跳转，请 <a href="pages/dashboard.html">点击这里</a>
    </p>
  </div>
</body>
</html>
