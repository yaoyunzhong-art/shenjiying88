<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日志监控 - Monitor Pro</title>
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <div class="app-container">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">MP</div>
        <div class="brand-text">
          <h1>Monitor Pro</h1>
          <p>v2.0.0</p>
        </div>
      </div>
      
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">概览</div>
          <a href="dashboard.html" class="nav-item">
            <span class="nav-icon">📊</span>
            <span>仪表盘</span>
          </a>
        </div>
        
        <div class="nav-section">
          <div class="nav-section-title">监控</div>
          <a href="performance.html" class="nav-item">
            <span class="nav-icon">🖥️</span>
            <span>性能监控</span>
          </a>
          <a href="logs.html" class="nav-item active">
            <span class="nav-icon">📋</span>
            <span>日志监控</span>
          </a>
          <a href="alerts.html" class="nav-item">
            <span class="nav-icon">🔔</span>
            <span>告警管理</span>
          </a>
        </div>
        
        <div class="nav-section">
          <div class="nav-section-title">分析</div>
          <a href="users.html" class="nav-item">
            <span class="nav-icon">👥</span>
            <span>用户分析</span>
          </a>
        </div>
      </nav>
      
      <div class="sidebar-footer">
        <div class="status-indicator">
          <span class="status-dot"></span>
          <span>系统正常运行</span>
        </div>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 顶部栏 -->
      <header class="top-bar">
        <div class="page-title">
          <h2>日志监控</h2>
          <p>实时日志收集、分析和检索</p>
        </div>
        <div class="top-actions">
          <div class="live-indicator">
            <span class="live-dot"></span>
            <span>实时</span>
          </div>
          <button class="btn btn-secondary" onclick="refreshLogs()">
            <span>🔄</span>
            <span>刷新</span>
          </button>
          <button class="theme-toggle" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span>
          </button>
        </div>
      </header>

      <!-- 内容区域 -->
      <div class="content-area">
        <!-- 日志统计 -->
        <div class="stats-grid" style="grid-template-columns: repeat(4, 1fr);">
          <div class="stat-card">
            <div class="stat-header">
              <span class="stat-title">总日志数</span>
              <div class="stat-icon info">📋</div>
            </div>
            <div class="stat-value" id="total-logs">12,458</div>
            <div class="stat-change">
              <span style="color: var(--text-secondary);">过去24小时</span>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-header">
              <span class="stat-title">错误日志</span>
              <div class="stat-icon danger">❌</div>
            </div>
            <div class="stat-value" id="error-logs" style="color: var(--danger);">23</div>
            <div class="stat-change negative">
              <span>↑</span>
              <span>5 较昨日</span>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-header">
              <span class="stat-title">警告日志</span>
              <div class="stat-icon warning">⚠️</div>
            </div>
            <div class="stat-value" id="warn-logs" style="color: var(--warning);">156</div>
            <div class="stat-change positive">
              <span>↓</span>
              <span>12 较昨日</span>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-header">
              <span class="stat-title">信息日志</span>
              <div class="stat-icon success">ℹ️</div>
            </div>
            <div class="stat-value" id="info-logs" style="color: var(--success);">12,279</div>
            <div class="stat-change positive">
              <span>↑</span>
              <span>1,234 较昨日</span>
            </div>
          </div>
        </div>

        <!-- 日志表格 -->
        <div class="data-table-container">
          <div class="table-header">
            <h3 class="table-title">日志列表</h3>
            <div class="table-filters">
              <select class="filter-select" id="level-filter">
                <option value="">所有级别</option>
                <option value="error">错误</option>
                <option value="warning">警告</option>
                <option value="info">信息</option>
                <option value="debug">调试</option>
              </select>
              <select class="filter-select" id="service-filter">
                <option value="">所有服务</option>
                <option value="api">API</option>
                <option value="database">数据库</option>
                <option value="auth">认证</option>
                <option value="gateway">网关</option>
                <option value="worker">工作器</option>
              </select>
              <input type="text" class="search-input" id="search-input" placeholder="搜索日志...">
            </div>
          </div>
          <table>
            <thead>
              <tr>
                <th>时间</th>
                <th>级别</th>
                <th>服务</th>
                <th>消息</th>
                <th>Trace ID</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="logs-tbody">
              <!-- 动态生成 -->
            </tbody>
          </table>
          <div class="pagination">
            <div class="pagination-info">
              显示第 <span id="page-start">1</span> 到 <span id="page-end">20</span> 条，共 <span id="total-count">100</span> 条
            </div>
            <div class="pagination-actions">
              <button class="page-btn" id="prev-btn" disabled>上一页</button>
              <button class="page-btn active">1</button>
              <button class="page-btn">2</button>
              <button class="page-btn">3</button>
              <button class="page-btn" id="next-btn">下一页</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/mock-api.js"></script>
  <script>
    let currentPage = 1;
    let currentFilters = {};
    let realtimeSubscription = null;

    document.addEventListener('DOMContentLoaded', async () => {
      initTheme();
      setupEventListeners();
      await loadLogs();
      startRealtimeUpdates();
    });

    function initTheme() {
      const theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      updateThemeIcon(theme);
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeIcon(newTheme);
    }

    function updateThemeIcon(theme) {
      const icon = document.getElementById('theme-icon');
      if (icon) {
        icon.textContent = theme === 'dark' ? '🌙' : '☀️';
      }
    }

    function setupEventListeners() {
      // 过滤器变化
      document.getElementById('level-filter').addEventListener('change', () => {
        currentPage = 1;
        applyFilters();
      });
      
      document.getElementById('service-filter').addEventListener('change', () => {
        currentPage = 1;
        applyFilters();
      });
      
      // 搜索输入
      document.getElementById('search-input').addEventListener('input', debounce(() => {
        currentPage = 1;
        applyFilters();
      }, 300));
      
      // 分页按钮
      document.getElementById('prev-btn').addEventListener('click', () => {
        if (currentPage > 1) {
          currentPage--;
          loadLogs();
        }
      });
      
      document.getElementById('next-btn').addEventListener('click', () => {
        currentPage++;
        loadLogs();
      });
    }

    function applyFilters() {
      currentFilters = {
        level: document.getElementById('level-filter').value,
        service: document.getElementById('service-filter').value,
        search: document.getElementById('search-input').value
      };
      loadLogs();
    }

    async function loadLogs() {
      try {
        const response = await MockAPI.getLogs(currentFilters, currentPage, 20);
        if (response.success) {
          renderLogs(response.data.logs);
          updatePagination(response.data.pagination);
          updateStats(response.data.summary);
        }
      } catch (error) {
        console.error('Failed to load logs:', error);
      }
    }

    function renderLogs(logs) {
      const tbody = document.getElementById('logs-tbody');
      if (!tbody) return;
      
      tbody.innerHTML = logs.map(log => `
        <tr>
          <td>${new Date(log.timestamp).toLocaleString('zh-CN')}</td>
          <td><span class="status-badge status-${log.level}">${log.level}</span></td>
          <td>${log.service}</td>
          <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${log.message}">${log.message}</td>
          <td><code style="font-size: 11px; background: var(--bg-secondary); padding: 2px 6px; border-radius: 4px;">${log.trace_id}</code></td>
          <td>
            <button class="btn btn-secondary" style="padding: 4px 12px; font-size: 12px;" onclick="viewLogDetail('${log.id}')">
              查看
            </button>
          </td>
        </tr>
      `).join('');
    }

    function updatePagination(pagination) {
      const start = (pagination.page - 1) * pagination.limit + 1;
      const end = Math.min(start + pagination.limit - 1, pagination.total);
      
      document.getElementById('page-start').textContent = start;
      document.getElementById('page-end').textContent = end;
      document.getElementById('total-count').textContent = pagination.total;
      
      document.getElementById('prev-btn').disabled = !pagination.hasPrev;
      document.getElementById('next-btn').disabled = !pagination.hasNext;
    }

    function updateStats(summary) {
      document.getElementById('total-logs').textContent = summary.total.toLocaleString();
      document.getElementById('error-logs').textContent = summary.error;
      document.getElementById('warn-logs').textContent = summary.warning;
      document.getElementById('info-logs').textContent = summary.info;
    }

    function startRealtimeUpdates() {
      // 每30秒刷新一次日志数据
      setInterval(() => {
        loadLogs();
      }, 30000);
    }

    function viewLogDetail(logId) {
      // 显示日志详情弹窗（简化版）
      alert('查看日志详情: ' + logId);
    }

    function refreshLogs() {
      loadLogs();
    }

    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }
  </script>
</body>
</html>
