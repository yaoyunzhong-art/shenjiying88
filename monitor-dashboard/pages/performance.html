<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>性能监控 - Monitor Pro</title>
  <link rel="stylesheet" href="../css/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app-container">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">MP</div>
        <div class="brand-text">
          <h1>Monitor Pro</h1>
          <p>v2.0.0</p>
        </div>
      </div>
      
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">概览</div>
          <a href="dashboard.html" class="nav-item">
            <span class="nav-icon">📊</span>
            <span>仪表盘</span>
          </a>
        </div>
        
        <div class="nav-section">
          <div class="nav-section-title">监控</div>
          <a href="performance.html" class="nav-item active">
            <span class="nav-icon">🖥️</span>
            <span>性能监控</span>
          </a>
          <a href="logs.html" class="nav-item">
            <span class="nav-icon">📋</span>
            <span>日志监控</span>
          </a>
          <a href="alerts.html" class="nav-item">
            <span class="nav-icon">🔔</span>
            <span>告警管理</span>
          </a>
        </div>
        
        <div class="nav-section">
          <div class="nav-section-title">分析</div>
          <a href="users.html" class="nav-item">
            <span class="nav-icon">👥</span>
            <span>用户分析</span>
          </a>
        </div>
      </nav>
      
      <div class="sidebar-footer">
        <div class="status-indicator">
          <span class="status-dot"></span>
          <span>系统正常运行</span>
        </div>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 顶部栏 -->
      <header class="top-bar">
        <div class="page-title">
          <h2>性能监控</h2>
          <p>实时系统性能指标监控</p>
        </div>
        <div class="top-actions">
          <div class="time-range">
            <button class="time-btn active" data-range="1h">1小时</button>
            <button class="time-btn" data-range="6h">6小时</button>
            <button class="time-btn" data-range="24h">24小时</button>
            <button class="time-btn" data-range="7d">7天</button>
          </div>
          <button class="theme-toggle" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span>
          </button>
        </div>
      </header>

      <!-- 内容区域 -->
      <div class="content-area">
        <!-- CPU 和内存 -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px;">
          <div class="chart-container">
            <div class="chart-header">
              <h3 class="chart-title">CPU 使用率</h3>
              <div class="live-indicator">
                <span class="live-dot"></span>
                <span>实时</span>
              </div>
            </div>
            <div class="chart-body" style="height: 250px;">
              <canvas id="cpu-chart"></canvas>
            </div>
            <div style="display: flex; gap: 20px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-color);">
              <div>
                <div style="font-size: 12px; color: var(--text-secondary);">当前使用率</div>
                <div style="font-size: 24px; font-weight: 700; color: var(--text-primary);" id="cpu-current">45.2%</div>
              </div>
              <div>
                <div style="font-size: 12px; color: var(--text-secondary);">核心数</div>
                <div style="font-size: 24px; font-weight: 700; color: var(--text-primary);">8</div>
              </div>
              <div>
                <div style="font-size: 12px; color: var(--text-secondary);">温度</div>
                <div style="font-size: 24px; font-weight: 700; color: var(--warning);" id="cpu-temp">62°C</div>
              </div>
            </div>
          </div>

          <div class="chart-container">
            <div class="chart-header">
              <h3 class="chart-title">内存使用</h3>
              <div class="live-indicator">
                <span class="live-dot"></span>
                <span>实时</span>
              </div>
            </div>
            <div class="chart-body" style="height: 250px;">
              <canvas id="memory-chart"></canvas>
            </div>
            <div style="display: flex; gap: 20px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-color);">
              <div>
                <div style="font-size: 12px; color: var(--text-secondary);">已使用</div>
                <div style="font-size: 24px; font-weight: 700; color: var(--text-primary);" id="mem-used">12.4 GB</div>
              </div>
              <div>
                <div style="font-size: 12px; color: var(--text-secondary);">总容量</div>
                <div style="font-size: 24px; font-weight: 700; color: var(--text-primary);">32 GB</div>
              </div>
              <div>
                <div style="font-size: 12px; color: var(--text-secondary);">使用率</div>
                <div style="font-size: 24px; font-weight: 700; color: var(--info);" id="mem-percent">38.8%</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 磁盘和网络 -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px;">
          <div class="chart-container">
            <div class="chart-header">
              <h3 class="chart-title">磁盘 I/O</h3>
              <div class="live-indicator">
                <span class="live-dot"></span>
                <span>实时</span>
              </div>
            </div>
            <div class="chart-body" style="height: 200px;">
              <canvas id="disk-chart"></canvas>
            </div>
            <div style="display: flex; gap: 20px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-color);">
              <div>
                <div style="font-size: 12px; color: var(--text-secondary);">读取速度</div>
                <div style="font-size: 20px; font-weight: 700; color: var(--success);" id="disk-read">125.5 MB/s</div>
              </div>
              <div>
                <div style="font-size: 12px; color: var(--text-secondary);">写入速度</div>
                <div style="font-size: 20px; font-weight: 700; color: var(--warning);" id="disk-write">89.2 MB/s</div>
              </div>
              <div>
                <div style="font-size: 12px; color: var(--text-secondary);">使用率</div>
                <div style="font-size: 20px; font-weight: 700; color: var(--text-primary);">44.5%</div>
              </div>
            </div>
          </div>

          <div class="chart-container">
            <div class="chart-header">
              <h3 class="chart-title">网络流量</h3>
              <div class="live-indicator">
                <span class="live-dot"></span>
                <span>实时</span>
              </div>
            </div>
            <div class="chart-body" style="height: 200px;">
              <canvas id="network-chart"></canvas>
            </div>
            <div style="display: flex; gap: 20px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-color);">
              <div>
                <div style="font-size: 12px; color: var(--text-secondary);">下载速度</div>
                <div style="font-size: 20px; font-weight: 700; color: var(--info);" id="net-download">45.2 MB/s</div>
              </div>
              <div>
                <div style="font-size: 12px; color: var(--text-secondary);">上传速度</div>
                <div style="font-size: 20px; font-weight: 700; color: var(--accent-primary);" id="net-upload">12.8 MB/s</div>
              </div>
              <div>
                <div style="font-size: 12px; color: var(--text-secondary);">连接数</div>
                <div style="font-size: 20px; font-weight: 700; color: var(--text-primary);">2,341</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/mock-api.js"></script>
  <script>
    // 初始化
    let charts = {};
    let realtimeSubscription = null;

    document.addEventListener('DOMContentLoaded', async () => {
      initTheme();
      initCharts();
      setupTimeRangeButtons();
      subscribeRealtime();
    });

    // 初始化主题
    function initTheme() {
      const theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      updateThemeIcon(theme);
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
      updateThemeIcon(newTheme);
    }

    function updateThemeIcon(theme) {
      const icon = document.getElementById('theme-icon');
      if (icon) {
        icon.textContent = theme === 'dark' ? '🌙' : '☀️';
      }
    }

    // 初始化所有图表
    function initCharts() {
      initCPUChart();
      initMemoryChart();
      initDiskChart();
      initNetworkChart();
    }

    function initCPUChart() {
      const ctx = document.getElementById('cpu-chart');
      if (!ctx) return;

      charts.cpu = new Chart(ctx, {
        type: 'line',
        data: {
          labels: generateTimeLabels(60),
          datasets: [{
            label: 'CPU 使用率',
            data: Array(60).fill(0).map(() => 30 + Math.random() * 40),
            borderColor: '#00d4ff',
            backgroundColor: 'rgba(0, 212, 255, 0.1)',
            fill: true,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            x: { display: false },
            y: {
              beginAtZero: true,
              max: 100,
              ticks: {
                callback: v => v + '%'
              }
            }
          }
        }
      });
    }

    function initMemoryChart() {
      const ctx = document.getElementById('memory-chart');
      if (!ctx) return;

      charts.memory = new Chart(ctx, {
        type: 'line',
        data: {
          labels: generateTimeLabels(60),
          datasets: [{
            label: '内存使用率',
            data: Array(60).fill(0).map(() => 30 + Math.random() * 20),
            borderColor: '#7000ff',
            backgroundColor: 'rgba(112, 0, 255, 0.1)',
            fill: true,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            x: { display: false },
            y: {
              beginAtZero: true,
              max: 100,
              ticks: {
                callback: v => v + '%'
              }
            }
          }
        }
      });
    }

    function initDiskChart() {
      const ctx = document.getElementById('disk-chart');
      if (!ctx) return;

      charts.disk = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: generateTimeLabels(30),
          datasets: [{
            label: '读取 (MB/s)',
            data: Array(30).fill(0).map(() => 50 + Math.random() * 100),
            backgroundColor: '#00ff88'
          }, {
            label: '写入 (MB/s)',
            data: Array(30).fill(0).map(() => 30 + Math.random() * 60),
            backgroundColor: '#ffaa00'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: true,
              labels: { color: '#8888a0' }
            }
          },
          scales: {
            x: { display: false },
            y: {
              beginAtZero: true,
              ticks: { color: '#8888a0' }
            }
          }
        }
      });
    }

    function initNetworkChart() {
      const ctx = document.getElementById('network-chart');
      if (!ctx) return;

      charts.network = new Chart(ctx, {
        type: 'line',
        data: {
          labels: generateTimeLabels(60),
          datasets: [{
            label: '下载 (MB/s)',
            data: Array(60).fill(0).map(() => 20 + Math.random() * 40),
            borderColor: '#4488ff',
            backgroundColor: 'rgba(68, 136, 255, 0.1)',
            fill: true,
            tension: 0.4
          }, {
            label: '上传 (MB/s)',
            data: Array(60).fill(0).map(() => 5 + Math.random() * 15),
            borderColor: '#ff66aa',
            backgroundColor: 'rgba(255, 102, 170, 0.1)',
            fill: true,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: true,
              labels: { color: '#8888a0' }
            }
          },
          scales: {
            x: { display: false },
            y: {
              beginAtZero: true,
              ticks: { color: '#8888a0' }
            }
          }
        }
      });
    }

    function generateTimeLabels(count) {
      return Array(count).fill(0).map((_, i) => {
        const d = new Date(Date.now() - (count - i) * 60000);
        return `${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
      });
    }

    function setupTimeRangeButtons() {
      const buttons = document.querySelectorAll('.time-btn');
      buttons.forEach(btn => {
        btn.addEventListener('click', async () => {
          buttons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const range = btn.dataset.range;
          await updateChartsForRange(range);
        });
      });
    }

    async function updateChartsForRange(range) {
      try {
        const response = await MockAPI.getSystemMetrics(range);
        if (response.success) {
          const data = response.data;
          
          // 更新CPU图表
          if (charts.cpu) {
            charts.cpu.data.labels = data.cpu.history.map(h => {
              const d = new Date(h.timestamp);
              return `${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
            });
            charts.cpu.data.datasets[0].data = data.cpu.history.map(h => h.value);
            charts.cpu.update('none');
          }
          
          // 更新内存图表
          if (charts.memory) {
            charts.memory.data.datasets[0].data = data.memory.history.map(h => h.value);
            charts.memory.update('none');
          }
        }
      } catch (error) {
        console.error('Failed to update charts:', error);
      }
    }

    function subscribeRealtime() {
      MockAPI.subscribeRealtime((data) => {
        // 更新CPU显示
        const cpuCurrent = document.getElementById('cpu-current');
        const cpuTemp = document.getElementById('cpu-temp');
        if (cpuCurrent) cpuCurrent.textContent = data.metrics.cpu.usage.toFixed(1) + '%';
        if (cpuTemp) cpuTemp.textContent = data.metrics.cpu.temperature.toFixed(0) + '°C';
        
        // 更新内存显示
        const memUsed = document.getElementById('mem-used');
        const memPercent = document.getElementById('mem-percent');
        if (memUsed) memUsed.textContent = (data.metrics.memory.usage / 100 * 32).toFixed(1) + ' GB';
        if (memPercent) memPercent.textContent = data.metrics.memory.usage.toFixed(1) + '%';
        
        // 更新图表实时数据（保持60个数据点）
        if (charts.cpu && charts.cpu.data.datasets[0].data.length >= 60) {
          charts.cpu.data.datasets[0].data.shift();
          charts.cpu.data.datasets[0].data.push(data.metrics.cpu.usage);
          charts.cpu.update('none');
        }
        
        if (charts.memory && charts.memory.data.datasets[0].data.length >= 60) {
          charts.memory.data.datasets[0].data.shift();
          charts.memory.data.datasets[0].data.push(data.metrics.memory.usage);
          charts.memory.update('none');
        }
      });
    }
  </script>
</body>
</html>
