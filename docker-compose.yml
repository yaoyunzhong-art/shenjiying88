# ═══════════════════════════════════════════════════════════════
# M5 Monorepo — Docker Compose (开发环境)
#
# 用途:
#   本地开发 / 单机部署的核心编排。
#   api 基于根目录 Dockerfile 多阶段构建，依赖 postgres + redis。
#
# 用法:
#   docker compose --env-file .env.docker up -d          # 后台启动全部
#   docker compose --env-file .env.docker up -d postgres redis  # 仅基础设施
#   docker compose --env-file .env.docker up -d api      # 仅 API
#   docker compose --env-file .env.docker build --parallel api   # 并行构建
#   docker compose --env-file .env.docker down           # 停止
#   docker compose --env-file .env.docker down -v        # 停止并删除 volume
#   docker compose --env-file .env.docker config         # 语法校验
# ═══════════════════════════════════════════════════════════════

# ─── 日志配置 ──────────────────────────────────────────
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

# ─── 健康检查基础 ──────────────────────────────────────
x-healthcheck-base: &healthcheck-base
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 20s

# ─── 网络 ──────────────────────────────────────────────
networks:
  m5-network:
    name: m5-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ─── 持久卷 ────────────────────────────────────────────
volumes:
  postgres_data:
    name: m5_postgres_data
    driver: local
  redis_data:
    name: m5_redis_data
    driver: local

# ─── 服务 ──────────────────────────────────────────────
services:

  # ─── PostgreSQL 15 ────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: m5-postgres
    restart: unless-stopped
    networks:
      - m5-network
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-m5}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-m5_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-m5_dev}
      POSTGRES_INITDB_ARGS: "--data-checksums --encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-m5} -d ${POSTGRES_DB:-m5_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging: *default-logging

  # ─── Redis 7 ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: m5-redis
    restart: unless-stopped
    networks:
      - m5-network
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging: *default-logging

  # ─── API (NestJS) ─────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-prod
      cache_from:
        - m5-api:latest
        - m5-api:cache
    image: ${API_IMAGE:-m5-api}:${BUILD_TAG:-latest}
    container_name: m5-api
    restart: unless-stopped
    networks:
      - m5-network
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: 3001
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      LYT_MODE: ${LYT_MODE:-mock}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3002,http://localhost:3003,http://localhost:3011,http://localhost:5173}

      # ─── 数据库 ─────────────────────────────────
      DATABASE_URL: ${DATABASE_URL:-postgresql://m5:m5_dev_password@postgres:5432/m5_dev}

      # ─── Redis ──────────────────────────────────
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # ─── JWT ────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-do-not-use-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}

      # ─── LLM / AI ────────────────────────────────
      LLM_DEFAULT_PROVIDER: ${LLM_DEFAULT_PROVIDER:-deepseek}
      LLM_DEEPSEEK_API_KEY: ${LLM_DEEPSEEK_API_KEY:-}
      LLM_DEEPSEEK_BASE_URL: ${LLM_DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      LLM_DEEPSEEK_MODEL: ${LLM_DEEPSEEK_MODEL:-deepseek-chat}
      LLM_DEEPSEEK_TIMEOUT_MS: ${LLM_DEEPSEEK_TIMEOUT_MS:-60000}
      LLM_DEEPSEEK_MAX_RETRIES: ${LLM_DEEPSEEK_MAX_RETRIES:-3}
      LLM_EMBEDDING_PROVIDER: ${LLM_EMBEDDING_PROVIDER:-text-embedding-3-small}
      LLM_MONTHLY_HARD_LIMIT_USD: ${LLM_MONTHLY_HARD_LIMIT_USD:-100}

      # ─── Qdrant ────────────────────────────────
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_GRPC_PORT: ${QDRANT_GRPC_PORT:-6334}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}

      # ─── RabbitMQ ─────────────────────────────
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-m5}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-m5_dev_password}

      # ─── MinIO ────────────────────────────────
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-m5}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-m5_dev_password}

      # ─── 可观测性 ─────────────────────────────
      ENABLE_TRACING: ${ENABLE_TRACING:-false}
      OTLP_EXPORTER: ${OTLP_EXPORTER:-none}

      # ─── Prisma 入口配置 ──────────────────────
      PRISMA_MIGRATE: ${PRISMA_MIGRATE:-true}
      PRISMA_SEED: ${PRISMA_SEED:-false}

    volumes:
      - ./scripts/entrypoint-api.sh:/app/entrypoint.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/v1/health/ping"]
      <<: *healthcheck-base
      start_period: 30s
    logging: *default-logging
