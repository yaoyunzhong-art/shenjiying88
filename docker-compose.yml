# ═══════════════════════════════════════════════════════════════
# M5 Monorepo — 生产级 docker-compose
#
# 用法:
#   docker compose up -d                          # 启动全部服务
#   docker compose up -d postgres redis           # 仅启动基础设施
#   docker compose up -d api                      # 仅启动 API
#   docker compose build --parallel               # 并行构建所有镜像
#   docker compose down                           # 停止全部
#   docker compose down -v                        # 停止并删除 volume
# ═══════════════════════════════════════════════════════════════

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck-base: &healthcheck-base
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 20s

# ──────────────────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────────────────
networks:
  m5-network:
    name: m5-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ──────────────────────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: m5_postgres_data
    driver: local
  redis_data:
    name: m5_redis_data
    driver: local
  rabbitmq_data:
    name: m5_rabbitmq_data
    driver: local
  minio_data:
    name: m5_minio_data
    driver: local
  qdrant_storage:
    name: m5_qdrant_storage
    driver: local
  qdrant_snapshots:
    name: m5_qdrant_snapshots
    driver: local
  nginx_logs:
    name: m5_nginx_logs
    driver: local
  certbot_www:
    name: m5_certbot_www
    driver: local
  certbot_conf:
    name: m5_certbot_conf
    driver: local

# ──────────────────────────────────────────────────────────
# Services
# ──────────────────────────────────────────────────────────
services:

  # ─── PostgreSQL ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: m5-postgres
    restart: unless-stopped
    networks:
      - m5-network
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-m5}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-m5_prod_password}
      POSTGRES_DB: ${POSTGRES_DB:-m5}
      POSTGRES_INITDB_ARGS: "--data-checksums --encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-m5} -d ${POSTGRES_DB:-m5}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ─── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: m5-redis
    restart: unless-stopped
    networks:
      - m5-network
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  # ─── RabbitMQ ───────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: m5-rabbitmq
    restart: unless-stopped
    profiles: ["full"]
    networks:
      - m5-network
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-m5}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-m5_prod_password}
      RABBITMQ_DEFAULT_VHOST: "/"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ─── MinIO (S3-compatible) ──────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: m5-minio
    restart: unless-stopped
    profiles: ["full"]
    networks:
      - m5-network
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-m5}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-m5_prod_password}
      MINIO_DOMAIN: minio
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # ─── API (NestJS) ───────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-prod
      cache_from:
        - m5-api:latest
        - m5-api:cache
    image: m5-api:${BUILD_TAG:-latest}
    container_name: m5-api
    restart: unless-stopped
    networks:
      - m5-network
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NODE_ENV: production
      API_PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-postgresql://m5:m5_prod_password@postgres:5432/m5}
      POSTGRES_URL: ${POSTGRES_URL:-postgresql://m5:m5_prod_password@postgres:5432/m5}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3002,http://localhost:3003,http://localhost:3011}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-m5}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-m5_prod_password}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-m5}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-m5_prod_password}
      LLM_DEFAULT_PROVIDER: ${LLM_DEFAULT_PROVIDER:-deepseek}
      LLM_DEEPSEEK_API_KEY: ${LLM_DEEPSEEK_API_KEY:-}
      LLM_DEEPSEEK_BASE_URL: ${LLM_DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENABLE_TRACING: ${ENABLE_TRACING:-false}
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
    volumes:
      - ./scripts/entrypoint-api.sh:/app/entrypoint.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/v1/health/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ─── Admin Web (Next.js) ────────────────────────────────
  admin-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: admin-prod
      cache_from:
        - m5-admin:latest
        - m5-admin:cache
    image: m5-admin:${BUILD_TAG:-latest}
    container_name: m5-admin-web
    restart: unless-stopped
    networks:
      - m5-network
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.m5.local/api/v1}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://api.m5.local}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:3001}
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3002/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  # ─── Storefront Web (Next.js) ───────────────────────────
  storefront-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: storefront-prod
      cache_from:
        - m5-storefront:latest
        - m5-storefront:cache
    image: m5-storefront:${BUILD_TAG:-latest}
    container_name: m5-storefront-web
    restart: unless-stopped
    networks:
      - m5-network
    ports:
      - "127.0.0.1:3003:3003"
    environment:
      NODE_ENV: production
      PORT: 3003
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.m5.local/api/v1}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://api.m5.local}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:3001}
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3003/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  # ─── ToB Web (Next.js) ──────────────────────────────────
  tob-web:
    build:
      context: .
      dockerfile: Dockerfile
      target: tob-prod
      cache_from:
        - m5-tob:latest
        - m5-tob:cache
    image: m5-tob:${BUILD_TAG:-latest}
    container_name: m5-tob-web
    restart: unless-stopped
    profiles: ["full"]
    networks:
      - m5-network
    ports:
      - "127.0.0.1:3011:3011"
    environment:
      NODE_ENV: production
      PORT: 3011
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.m5.local/api/v1}
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:3001}
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3011/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # ─── Nginx (Reverse Proxy) ──────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: m5-nginx
    restart: unless-stopped
    networks:
      - m5-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - admin-web
      - storefront-web
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  # ─── Qdrant (Vector DB) ─────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.10.0
    container_name: m5-qdrant
    restart: unless-stopped
    profiles: ["full"]
    networks:
      - m5-network
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    environment:
      QDRANT__SERVICE__ENABLE_TELEMETRY: "false"
      QDRANT__LOG_LEVEL: "INFO"
    volumes:
      - qdrant_storage:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
