<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>shenjiying88 AI Model Config API (V9)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui.css"
  />
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
    .topbar { background: #001529; color: #fff; padding: 12px 24px; }
    .topbar h1 { margin: 0; font-size: 18px; font-weight: 500; }
    .topbar small { color: #8c8c8c; margin-left: 12px; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>shenjiying88 · AI Model Config API <small>V9 / Phase-87 · 7 endpoints · 180 tests</small></h1>
  </div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-bundle.js" crossorigin></script>
  <script>
    window.onload = () => {
      window.ui = SwaggerUIBundle({
        url: './v9-ai-model-config.openapi.yaml',
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
        ],
        layout: 'BaseLayout',
        defaultModelsExpandDepth: -1,
        docExpansion: 'list',
        filter: true,
        tryItOutEnabled: true,
      })
    }
  </script>
</body>
</html>
