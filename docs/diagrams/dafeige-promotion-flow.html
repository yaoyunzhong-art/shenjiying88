<style>

    color-scheme: light dark;

    --line: #64748b;
    --neutral: #e2e8f0;
    --input: #bfdbfe;
    --process: #c7d2fe;
    --storage: #99f6e4;
    --external: #fde68a;
    --risk: #fecaca;
    --outgoing: #fed7aa;
    --crm: #d1fae5;
    --ai: #e0e7ff;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --fg: #e5e7eb;
      --muted: #a3adbd;
      --line: #94a3b8;
      --neutral: #334155;
      --input: #1d4ed8;
      --process: #4338ca;
      --storage: #0f766e;
      --external: #92400e;
      --risk: #991b1b;
      --outgoing: #92400e;
      --crm: #065f46;
      --ai: #3730a3;
    }
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font:
      14px/1.4 ui-sans-serif,
      system-ui,
      -apple-system,
      BlinkMacSystemFont,
      "Segoe UI",
      sans-serif;
  }
  main {
    max-width: 1200px;
    margin: 32px auto;
    padding: 0 20px;
  }
  svg {
    width: 100%;
    height: auto;
    display: block;
  }
  .title {
    font-size: 20px;
    font-weight: 650;
    fill: var(--fg);
  }
  .label {
    font-size: 13px;
    font-weight: 600;
    fill: var(--fg);
  }
  .small {
    font-size: 11px;
    fill: var(--muted);
  }
  .node {
    stroke: var(--line);
    stroke-width: 1.2;
  }
  .neutral {
    fill: var(--neutral);
  }
  .input {
    fill: var(--input);
  }
  .process {
    fill: var(--process);
  }
  .storage {
    fill: var(--storage);
  }
  .external {
    fill: var(--external);
  }
  .risk {
    fill: var(--risk);
  }
  .outgoing {
    fill: var(--outgoing);
  }
  .crm {
    fill: var(--crm);
  }
  .ai {
    fill: var(--ai);
  }
  .edge {
    stroke: var(--line);
    stroke-width: 1.5;
    fill: none;
  }
  .edge-dash {
    stroke: var(--line);
    stroke-width: 1.2;
    fill: none;
    stroke-dasharray: 5 3;
  }
  .zone {
    fill: none;
    stroke: var(--line);
    stroke-width: 1.2;
    stroke-dasharray: 6 5;
    opacity: 0.85;
  }
  .zone-bg {
    fill: var(--neutral);
    opacity: 0.06;
  }
  .arrow {
    fill: var(--line);
  }
</style>
