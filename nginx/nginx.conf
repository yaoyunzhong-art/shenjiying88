# ═══════════════════════════════════════════════════════════════
# shenjiying88 — Nginx 反向代理配置（开发环境）
#
# 子域映射:
#   api.shenjiying.localhost     → API (3000)
#   admin.shenjiying.localhost   → Admin Web (3002)
#   store.shenjiying.localhost   → Storefront Web (3003)
#   tob.shenjiying.localhost     → ToB Web (3004)
#   (默认) localhost              → Admin Web (3002)
# ═══════════════════════════════════════════════════════════════

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # ─── API 子域 ──────────────────────────────────────────
    server {
        listen 80;
        server_name api.shenjiying.localhost;

        location / {
            proxy_pass http://api:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── Admin 子域 ────────────────────────────────────────
    server {
        listen 80;
        server_name admin.shenjiying.localhost;

        location / {
            proxy_pass http://admin-web:3002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── Storefront 子域 ───────────────────────────────────
    server {
        listen 80;
        server_name store.shenjiying.localhost;

        location / {
            proxy_pass http://storefront-web:3003;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── ToB 子域 ──────────────────────────────────────────
    server {
        listen 80;
        server_name tob.shenjiying.localhost;

        location / {
            proxy_pass http://tob-web:3004;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── 默认（localhost 直接访问 → admin）────────────
    server {
        listen 80 default_server;
        server_name _;

        location / {
            proxy_pass http://admin-web:3002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
