# ═══════════════════════════════════════════════════════════════
# M5 Monorepo — Nginx 生产级反向代理配置
#
# 路由映射:
#   api.m5.local            → API NestJS (3001)
#   admin.m5.local          → Admin Web (3002)
#   store.m5.local          → Storefront Web (3003)
#   tob.m5.local            → ToB Web (3011)
#   minio.m5.local          → MinIO Console (9001)
#   rabbitmq.m5.local       → RabbitMQ Management (15672)
# ═══════════════════════════════════════════════════════════════

user nginx;
worker_processes auto;
worker_cpu_affinity auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# ─── Load Modules ────────────────────────────────────────
load_module modules/ngx_http_upstream_hash_module.so;

events {
    multi_accept on;
    worker_connections 2048;
    use epoll;
    accept_mutex_delay 100ms;
}

http {
    # ─── Basic Settings ─────────────────────────────────
    charset utf-8;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 50m;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # ─── MIME Types ─────────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Logging Format (JSON for production) ────────────
    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"http_x_request_id":"$http_x_request_id"'
    '}';

    access_log /var/log/nginx/access.log json buffer=32k flush=5s;

    # ─── Gzip ───────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/ld+json
        application/manifest+json
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    # ─── Security Headers ───────────────────────────────
    map $sent_http_content_type $xss_protection {
        default "1; mode=block";
    }

    # ─── Rate Limiting Zones ────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_ratelimit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=admin_ratelimit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=store_ratelimit:10m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=login_ratelimit:10m rate=5r/m;

    # ─── Upstreams ──────────────────────────────────────
    upstream api_backend {
        least_conn;
        server api:3001 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    upstream admin_backend {
        least_conn;
        server admin-web:3002 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream storefront_backend {
        least_conn;
        server storefront-web:3003 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream tob_backend {
        least_conn;
        server tob-web:3011 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # ─── SSL 配置 (生产用 Let's Encrypt) ────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # ─── HTTP → HTTPS 重定向 ─────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ─── API Server ──────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.m5.local;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

        # CORS preflight
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Request-Id,Traceparent" always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range,X-Request-Id" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Rate limit
        limit_req zone=api_ratelimit burst=50 nodelay;

        # Swagger docs — allow unrestricted
        location /docs {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Swagger JSON
        location /api/v1/docs-json {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API v1
        location /api/v1/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 10s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 8k;
            proxy_busy_buffers_size 16k;

            # Login-specific rate limit
            limit_req zone=login_ratelimit burst=3 nodelay;
        }

        # Socket.io (WebSocket fallback)
        location /socket.io/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
        }

        # Health check
        location /health {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Request-Id $request_id;
            access_log off;
        }

        # OpenTelemetry traces (if needed)
        location /v1/traces {
            deny all;
            return 404;
        }
    }

    # ─── Admin Web ────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name admin.m5.local;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://api.m5.local wss://api.m5.local;" always;

        limit_req zone=admin_ratelimit burst=30 nodelay;

        # Static assets (long cache)
        location /_next/static/ {
            proxy_pass http://admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            expires 365d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Static assets (Next.js chunked)
        location /_next/ {
            proxy_pass http://admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Public assets
        location /public/ {
            proxy_pass http://admin_backend;
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        # All other routes
        location / {
            proxy_pass http://admin_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
            proxy_read_timeout 30s;

            # Don't cache HTML
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }

    # ─── Storefront Web ───────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name store.m5.local;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

        limit_req zone=store_ratelimit burst=100 nodelay;

        # Static assets
        location /_next/static/ {
            proxy_pass http://storefront_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 365d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /_next/ {
            proxy_pass http://storefront_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        location /public/ {
            proxy_pass http://storefront_backend;
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        location / {
            proxy_pass http://storefront_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
            proxy_read_timeout 30s;
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }

    # ─── ToB Web ──────────────────────────────────────────
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name tob.m5.local;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

        limit_req zone=store_ratelimit burst=50 nodelay;

        location /_next/static/ {
            proxy_pass http://tob_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 365d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /_next/ {
            proxy_pass http://tob_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        location / {
            proxy_pass http://tob_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
            proxy_read_timeout 30s;
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }
}
