# ═══════════════════════════════════════════════════════════════
# M5 — Nginx default server config
# ═══════════════════════════════════════════════════════════════

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # 默认返回 444 (不响应未知域名)
    return 444;
}
