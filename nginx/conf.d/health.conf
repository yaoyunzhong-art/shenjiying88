# ═══════════════════════════════════════════════════════════════
# M5 — Nginx health check endpoint
# ═══════════════════════════════════════════════════════════════

server {
    listen 127.0.0.1:80;
    server_name localhost;

    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}
