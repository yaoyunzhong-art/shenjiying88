# ═══════════════════════════════════════════════════════════════
# M5 — Nginx SSL/TLS Configuration (自签名 localhost)
#
# 前置条件: 运行 scripts/init-selfsigned-cert.sh 生成证书
# ═══════════════════════════════════════════════════════════════

# ── 全局 SSL 配置 ─────────────────────────────────────────
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 10m;
ssl_protocols       TLSv1.2 TLSv1.3;
ssl_ciphers         HIGH:!aNULL:!MD5;
ssl_prefer_server_ciphers on;

# ── HTTP → HTTPS 跳转 ─────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.m5.local admin.m5.local store.m5.local tob.m5.local;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── API (api.m5.local:443) ────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.m5.local;

    ssl_certificate     /etc/nginx/ssl/m5.local.crt;
    ssl_certificate_key /etc/nginx/ssl/m5.local.key;

    location / {
        proxy_pass http://api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

