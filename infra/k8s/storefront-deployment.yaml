# ═══════════════════════════════════════════════════════════════
# M5 — Storefront Web (Next.js) Deployment & Service
# ═══════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: m5-storefront-web
  namespace: m5
  labels:
    app: m5-storefront-web
    app.kubernetes.io/part-of: shenjiying
    app.kubernetes.io/component: frontend
    app.kubernetes.io/name: storefront-web
spec:
  ports:
    - name: http
      port: 3003
      targetPort: 3003
      protocol: TCP
  selector:
    app: m5-storefront-web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: m5-storefront-web
  namespace: m5
  labels:
    app: m5-storefront-web
    app.kubernetes.io/part-of: shenjiying
    app.kubernetes.io/component: frontend
    app.kubernetes.io/name: storefront-web
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: m5-storefront-web
  template:
    metadata:
      labels:
        app: m5-storefront-web
        app.kubernetes.io/part-of: shenjiying
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3003"
        sidecar.istio.io/inject: "true"
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: storefront-web
          image: ghcr.io/shenjiying/shenjiying88/storefront-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3003
              name: http
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3003"
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: m5-config
                  key: NEXT_PUBLIC_API_URL
            - name: NEXT_PUBLIC_WS_URL
              valueFrom:
                configMapKeyRef:
                  name: m5-config
                  key: NEXT_PUBLIC_WS_URL
            - name: API_INTERNAL_URL
              value: "http://m5-api:3001"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: 3003
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /
              port: 3003
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /
              port: 3003
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - m5-storefront-web
                topologyKey: kubernetes.io/hostname
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: m5-storefront-web
  namespace: m5
  labels:
    app: m5-storefront-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: m5-storefront-web
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
