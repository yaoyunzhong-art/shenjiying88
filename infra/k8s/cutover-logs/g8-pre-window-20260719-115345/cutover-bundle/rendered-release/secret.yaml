# ═══════════════════════════════════════════════════════════════
# M5 — Secrets (占位,生产用 External Secrets Operator 或 Helm)
# ═══════════════════════════════════════════════════════════════
# 警告: 不要将明文密码提交至 Git!
# 生产环境应使用:
#   - External Secrets Operator + AWS Secrets Manager / GCP Secret Manager
#   - sealed-secrets (Bitnami)
#   - Helm values + CI/CD pipeline injection
# ═══════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: m5-secrets
  namespace: m5
  labels:
    app.kubernetes.io/part-of: shenjiying
type: Opaque
stringData:
  # ─── 数据库 ─────────────────────────────────────────
  POSTGRES_PASSWORD: "replace-with-real-postgres-password"
  DATABASE_URL: "postgresql://m5admin:replace-with-real-postgres-password@replace-postgres-host:5432/m5platform"

  # ─── JWT ────────────────────────────────────────────
  JWT_SECRET: "change-me-in-production-please-generate-a-secure-random-string"
  JWT_EXPIRES_IN: "7d"

  # ─── Redis ──────────────────────────────────────────
  REDIS_PASSWORD: ""

  # ─── RabbitMQ ───────────────────────────────────────
  RABBITMQ_USER: "m5"
  RABBITMQ_PASSWORD: "replace-with-real-rabbitmq-password"

  # ─── MinIO ──────────────────────────────────────────
  MINIO_ROOT_USER: "m5"
  MINIO_ROOT_PASSWORD: "replace-with-real-minio-password"
  MINIO_ACCESS_KEY: "m5"
  MINIO_SECRET_KEY: "replace-with-real-minio-password"

  # ─── LLM API Keys ──────────────────────────────────
  LLM_DEEPSEEK_API_KEY: ""
  LLM_OPENAI_API_KEY: ""
  LLM_CLAUDE_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  COHERE_API_KEY: ""
  QDRANT_API_KEY: ""
---
# ─── Docker Registry Pull Secret ──────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: acr-regcred
  namespace: m5
  labels:
    app.kubernetes.io/part-of: shenjiying
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: '{"auths":{"shenjiying88acr20260717-registry.cn-hangzhou.cr.aliyuncs.com":{"username":"replace-with-real-acr-username","password":"replace-with-real-acr-password","auth":"replace-with-real-acr-auth-base64"}}}'
