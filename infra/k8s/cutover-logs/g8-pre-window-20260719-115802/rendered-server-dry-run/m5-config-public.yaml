apiVersion: v1
kind: ConfigMap
metadata:
  name: m5-config
  namespace: m5
  labels:
    app.kubernetes.io/part-of: shenjiying
data:
  API_PORT: "3001"
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  LYT_MODE: "mock"
  ENABLE_TRACING: "false"
  CORS_ORIGIN: "https://admin.m5-platform.com,https://store.m5-platform.com,https://tob.m5-platform.com"
  LLM_DEFAULT_PROVIDER: "deepseek"
  LLM_DEEPSEEK_BASE_URL: "https://api.deepseek.com/v1"
  LLM_DEEPSEEK_MODEL: "deepseek-chat"
  LLM_DEEPSEEK_TIMEOUT_MS: "60000"
  LLM_DEEPSEEK_MAX_RETRIES: "3"
  LLM_FALLBACK_CHAIN: "deepseek,openai,claude"
  LLM_MONTHLY_HARD_LIMIT_USD: "100"
  LLM_MONTHLY_SOFT_LIMIT_USD: "80"
  LLM_ALERT_THRESHOLD: "0.8"
  LLM_ENABLE_PROMPT_CACHE: "true"
  LLM_CACHE_TTL_SECONDS: "86400"
  EMBEDDING_PROVIDER: "text-embedding-3-small"
  POSTGRES_HOST: "pgm-bp1dp000v7y96z50.pg.rds.aliyuncs.com"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "m5platform"
  DATABASE_URL: "REUSE_CURRENT_VALUE"
  REDIS_HOST: "r-bp1db6d2422ff374.redis.rds.aliyuncs.com"
  REDIS_PORT: "6379"
  RABBITMQ_HOST: "m5-rabbitmq"
  RABBITMQ_PORT: "5672"
  RABBITMQ_VHOST: "/"
  QDRANT_HOST: "m5-qdrant"
  QDRANT_PORT: "6333"
  QDRANT_GRPC_PORT: "6334"
  MINIO_ENDPOINT: "m5-minio"
  MINIO_PORT: "9000"
  ADMIN_WEB_PORT: "3002"
  STOREFRONT_PORT: "3003"
  TOB_WEB_PORT: "3011"
  NEXT_PUBLIC_API_URL: "https://api.m5-platform.com/api/v1"
  NEXT_PUBLIC_WS_URL: "wss://api.m5-platform.com"
