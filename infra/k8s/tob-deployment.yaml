# ═══════════════════════════════════════════════════════════════
# M5 — ToB Web (Next.js) Deployment & Service
# ═══════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: m5-tob-web
  namespace: m5
  labels:
    app: m5-tob-web
    app.kubernetes.io/part-of: shenjiying
    app.kubernetes.io/component: frontend
    app.kubernetes.io/name: tob-web
spec:
  ports:
    - name: http
      port: 3011
      targetPort: 3011
      protocol: TCP
  selector:
    app: m5-tob-web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: m5-tob-web
  namespace: m5
  labels:
    app: m5-tob-web
    app.kubernetes.io/part-of: shenjiying
    app.kubernetes.io/component: frontend
    app.kubernetes.io/name: tob-web
spec:
  replicas: 0
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: m5-tob-web
  template:
    metadata:
      labels:
        app: m5-tob-web
        app.kubernetes.io/part-of: shenjiying
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3011"
        sidecar.istio.io/inject: "true"
    spec:
      imagePullSecrets:
        - name: acr-regcred
      containers:
        - name: tob-web
          image: shenjiying88acr20260717-registry.cn-hangzhou.cr.aliyuncs.com/shenjiying88/m5-tob-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3011
              name: http
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3011"
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: m5-config
                  key: NEXT_PUBLIC_API_URL
            - name: API_INTERNAL_URL
              value: "http://m5-api:3001"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: 3011
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /
              port: 3011
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /
              port: 3011
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: m5-tob-web
  namespace: m5
  labels:
    app: m5-tob-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: m5-tob-web
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
