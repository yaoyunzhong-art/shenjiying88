# ═══════════════════════════════════════════════════════════════
# M5 — RabbitMQ Deployment & Service
# ═══════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: m5-rabbitmq
  namespace: m5
  labels:
    app: m5-rabbitmq
    app.kubernetes.io/part-of: shenjiying
    app.kubernetes.io/component: message-queue
    app.kubernetes.io/name: rabbitmq
spec:
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
      protocol: TCP
    - name: management
      port: 15672
      targetPort: 15672
      protocol: TCP
  selector:
    app: m5-rabbitmq
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: m5-rabbitmq
  namespace: m5
  labels:
    app: m5-rabbitmq
    app.kubernetes.io/part-of: shenjiying
    app.kubernetes.io/component: message-queue
    app.kubernetes.io/name: rabbitmq
spec:
  serviceName: m5-rabbitmq
  replicas: 1
  selector:
    matchLabels:
      app: m5-rabbitmq
  template:
    metadata:
      labels:
        app: m5-rabbitmq
        app.kubernetes.io/part-of: shenjiying
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "15692"
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: m5-secrets
                  key: RABBITMQ_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: m5-secrets
                  key: RABBITMQ_PASSWORD
            - name: RABBITMQ_DEFAULT_VHOST
              value: "/"
            - name: RABBITMQ_ERLANG_COOKIE
              valueFrom:
                secretKeyRef:
                  name: m5-secrets
                  key: RABBITMQ_USER
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - ping
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
      volumes:
        - name: rabbitmq-data
          persistentVolumeClaim:
            claimName: m5-rabbitmq-pvc
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: standard
        resources:
          requests:
            storage: 10Gi
