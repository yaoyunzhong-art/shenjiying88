# ═══════════════════════════════════════════════════════════════
# M5 — Secrets (占位,生产用 External Secrets Operator 或 Helm)
# ═══════════════════════════════════════════════════════════════
# 警告: 不要将明文密码提交至 Git!
# 生产环境应使用:
#   - External Secrets Operator + AWS Secrets Manager / GCP Secret Manager
#   - sealed-secrets (Bitnami)
#   - Helm values + CI/CD pipeline injection
# ═══════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: m5-secrets
  namespace: m5
  labels:
    app.kubernetes.io/part-of: shenjiying
type: Opaque
stringData:
  # ─── 数据库 ─────────────────────────────────────────
  POSTGRES_PASSWORD: "replace-with-real-postgres-password"
  DATABASE_URL: "postgresql://replace-user:replace-password@replace-host:5432/replace-db"

  # ─── JWT ────────────────────────────────────────────
  JWT_SECRET: "replace-with-long-random-secret"
  JWT_EXPIRES_IN: "7d"

  # ─── Redis ──────────────────────────────────────────
  REDIS_PASSWORD: ""

  # ─── RabbitMQ ───────────────────────────────────────
  RABBITMQ_USER: "replace-with-real-rabbitmq-user"
  RABBITMQ_PASSWORD: "replace-with-real-rabbitmq-password"

  # ─── MinIO ──────────────────────────────────────────
  MINIO_ROOT_USER: "replace-with-real-minio-user"
  MINIO_ROOT_PASSWORD: "replace-with-real-minio-password"
  MINIO_ACCESS_KEY: "replace-with-real-minio-access-key"
  MINIO_SECRET_KEY: "replace-with-real-minio-secret-key"

  # ─── LLM API Keys ──────────────────────────────────
  LLM_DEEPSEEK_API_KEY: ""
  LLM_OPENAI_API_KEY: ""
  LLM_CLAUDE_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  COHERE_API_KEY: ""
  QDRANT_API_KEY: ""
---
# ─── ACR Pull Secret Template ─────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: acr-regcred
  namespace: m5
  labels:
    app.kubernetes.io/part-of: shenjiying
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: >-
    {"auths":{"shenjiying88acr20260717-registry.cn-hangzhou.cr.aliyuncs.com":{"username":"replace-with-acr-username","password":"replace-with-acr-password","auth":"replace-with-base64-username-password"}}}
