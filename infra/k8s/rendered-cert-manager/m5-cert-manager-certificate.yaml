apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: m5-public-tls
  namespace: m5
  labels:
    app.kubernetes.io/part-of: shenjiying
    app.kubernetes.io/component: cert-manager
spec:
  secretName: m5-tls
  issuerRef:
    name: letsencrypt-prod-m5
    kind: ClusterIssuer
  dnsNames:
    - api.sportsant.net
    - admin.sportsant.net
    - store.sportsant.net
    - tob.sportsant.net
