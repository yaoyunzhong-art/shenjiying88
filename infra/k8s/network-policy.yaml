# ═══════════════════════════════════════════════════════════════
# M5 — Network Policies (零信任网络安全)
# ═══════════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: m5
  labels:
    app.kubernetes.io/part-of: shenjiying
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-ingress
  namespace: m5
  labels:
    app.kubernetes.io/part-of: shenjiying
spec:
  podSelector:
    matchLabels:
      app: m5-api
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: m5-admin-web
        - podSelector:
            matchLabels:
              app: m5-storefront-web
        - podSelector:
            matchLabels:
              app: m5-tob-web
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3001
    - from:
        - podSelector:
            matchLabels:
              app: m5-api
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: m5-postgres
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: m5-redis
      ports:
        - port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: m5-rabbitmq
      ports:
        - port: 5672
    - to:
        - podSelector:
            matchLabels:
              app: m5-minio
      ports:
        - port: 9000
    - to:
        - podSelector:
            matchLabels:
              app: m5-qdrant
      ports:
        - port: 6333
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-ingress
  namespace: m5
  labels:
    app.kubernetes.io/part-of: shenjiying
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - m5-admin-web
          - m5-storefront-web
          - m5-tob-web
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3002
        - port: 3003
        - port: 3011
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: m5-api
      ports:
        - port: 3001
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-database-egress
  namespace: m5
  labels:
    app.kubernetes.io/part-of: shenjiying
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - m5-postgres
          - m5-redis
          - m5-rabbitmq
          - m5-minio
          - m5-qdrant
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: m5-api
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
