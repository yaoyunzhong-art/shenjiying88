global:
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alerts@m5.local'
  smtp_auth_username: 'alert@example.com'
  smtp_auth_password: 'your-email-password'

  slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'

  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

  wechat_api_url: 'https://qyapi.weixin.qq.com/cgi-bin/'
  wechat_api_secret: 'your-corp-secret'
  wechat_api_corp_id: 'your-corp-id'

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'service', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    # 严重级别告警 - 立即通知
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 5m
      continue: true

    # 警告级别告警 - 合并通知
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 5m
      repeat_interval: 2h

    # API 服务相关告警
    - match_re:
        service: api|gateway
      receiver: 'backend-team'
      routes:
        - match:
            severity: critical
          receiver: 'backend-team-critical'

    # 数据库相关告警
    - match_re:
        service: database|cache|queue
      receiver: 'dba-team'

    # 基础设施告警
    - match_re:
        service: infrastructure|node
      receiver: 'sre-team'

inhibit_rules:
  # 当节点宕机时，抑制该节点上的其他告警
  - source_match:
      alertname: 'NodeDown'
    target_match_re:
      alertname: 'NodeHigh.*|.*Down'
    equal: ['instance']

  # 当 API 宕机时，抑制相关依赖服务告警
  - source_match:
      alertname: 'APIDown'
    target_match_re:
      alertname: '.*HighLatency|.*HighErrorRate'
    equal: ['service']

receivers:
  - name: 'default'
    email_configs:
      - to: 'ops@m5.local'
        headers:
          Subject: '[M5 Alert] {{ .GroupLabels.alertname }}'
        html: |
          {{ range .Alerts }}
          <h2>{{ .Annotations.summary }}</h2>
          <p><strong>告警级别:</strong> {{ .Labels.severity }}</p>
          <p><strong>服务:</strong> {{ .Labels.service }}</p>
          <p><strong>描述:</strong> {{ .Annotations.description }}</p>
          <p><strong>时间:</strong> {{ .StartsAt.Format "2006-01-02 15:04:05" }}</p>
          {{ if .Annotations.runbook_url }}
          <p><strong>处理手册:</strong> <a href="{{ .Annotations.runbook_url }}">查看</a></p>
          {{ end }}
          <hr>
          {{ end }}

  - name: 'critical-alerts'
    email_configs:
      - to: 'oncall@m5.local'
        send_resolved: true
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }} - {{ .GroupLabels.service }}'
    slack_configs:
      - channel: '#alerts-critical'
        send_resolved: true
        title: ':fire: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Severity:* {{ .Labels.severity }}
          *Service:* {{ .Labels.service }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Time:* {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}
    pagerduty_configs:
      - service_key: '<pagerduty-service-key>'
        severity: critical
        description: '{{ .GroupLabels.alertname }} - {{ .GroupLabels.service }}'
        client: 'M5 Monitoring'
        client_url: 'https://grafana.m5.local'

  - name: 'warning-alerts'
    email_configs:
      - to: 'ops@m5.local'
        send_resolved: true
    slack_configs:
      - channel: '#alerts-warning'
        send_resolved: true
        title: ':warning: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Severity:* {{ .Labels.severity }}
          *Service:* {{ .Labels.service }}
          *Summary:* {{ .Annotations.summary }}
          {{ end }}

  - name: 'backend-team'
    email_configs:
      - to: 'backend@m5.local'
    slack_configs:
      - channel: '#backend-alerts'
        title: 'Backend Alert: {{ .GroupLabels.alertname }}'

  - name: 'backend-team-critical'
    email_configs:
      - to: 'backend@m5.local'
        send_resolved: true
    slack_configs:
      - channel: '#backend-critical'
        send_resolved: true
        title: ':rotating_light: CRITICAL: {{ .GroupLabels.alertname }}'

  - name: 'dba-team'
    email_configs:
      - to: 'dba@m5.local'
    slack_configs:
      - channel: '#dba-alerts'

  - name: 'sre-team'
    email_configs:
      - to: 'sre@m5.local'
    slack_configs:
      - channel: '#sre-alerts'