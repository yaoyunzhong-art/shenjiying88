# =============================================================================
#  Git Governance — 远程推送检测 & 圈梁五道箍合规门禁
# =============================================================================
# 圈梁五道箍（永久铁律）:
#   ① TSC通过 → ② 测试存在（0 fail·无skip） → ③ 圈梁表更新 → ④ PRD标记 → ⑤ 知识赋能
# =============================================================================
name: Git Governance

on:
  push:
    branches: [ main, develop, 'release/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ── 远程推送检测 ──────────────────────────────────────────────────────────
  remote-push-validation:
    name: ① 远程推送检测 — 变更审查
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate git message convention
        run: |
          COMMIT_MSG=$(git log --format=%s -1)
          echo "Commit message: $COMMIT_MSG"
          # 校验是否包含语义化前缀
          if [[ "${{ github.event_name }}" == "push" ]]; then
            if echo "$COMMIT_MSG" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|audit|memo):'; then
              echo "✅ Conventional commit detected"
            else
              echo "⚠️  Commit message does not follow conventional commit format"
              echo "   Recommended: feat|fix|docs|style|refactor|perf|test|chore|ci|build|audit|memo: message"
            fi
          fi

      - name: Detect sensitive files in push
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            FILES=$(git diff --name-only HEAD~1..HEAD 2>/dev/null || echo "no-diff")
          fi
          echo "Files changed: $FILES"
          # 检查是否包含敏感文件
          echo "$FILES" | while read -r file; do
            case "$file" in
              *.env|*.pem|*secret*|*password*|*.key|credentials*)
                echo "❌ SECURITY: Sensitive file detected: $file"
                exit 1
                ;;
            esac
          done
          echo "✅ No sensitive files detected"

      - name: Validate branch naming convention
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          if [[ "$BRANCH" =~ ^(main|develop|release/|hotfix/|feature/|fix/|chore/|docs/) ]]; then
            echo "✅ Branch name '$BRANCH' follows convention"
          else
            echo "⚠️  Branch name '$BRANCH' does not follow convention"
            echo "   Allowed prefixes: main, develop, release/, hotfix/, feature/, fix/, chore/, docs/"
          fi

  # ── 圈梁五道箍合规门禁 ──────────────────────────────────────────────────────
  guang-beam-compliance:
    name: 圈梁五道箍合规检查
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ② 圈梁表更新检测
        run: |
          if [ -f "docs/governance/guang-beam-table.md" ]; then
            echo "✅ 圈梁表存在"
            cat docs/governance/guang-beam-table.md | head -20
          else
            echo "⚠️  圈梁表 (docs/governance/guang-beam-table.md) 不存在"
          fi

      - name: ③ PRD标记检测
        run: |
          # 检查最近的PRD相关文件
          PRD_FILES=$(find . -name "*PRD*" -o -name "*prd*" -o -name "*prd*.md" 2>/dev/null | head -5)
          if [ -n "$PRD_FILES" ]; then
            echo "✅ PRD文档存在:"
            echo "$PRD_FILES"
          else
            echo "⚠️  未找到PRD文档标记"
          fi

      - name: ④ 知识赋能检测
        run: |
          KNOWLEDGE_DIR="docs/knowledge"
          if [ -d "$KNOWLEDGE_DIR" ]; then
            echo "✅ 知识库目录存在:"
            find "$KNOWLEDGE_DIR" -name "*.md" -type f 2>/dev/null | head -10
          else
            echo "⚠️  知识库目录 $KNOWLEDGE_DIR 不存在"
          fi

  # ── 铁律门禁 — 必须通过 ────────────────────────────────────────────────────
  iron-law-gate:
    name: 🔒 铁律门禁 (gating)
    runs-on: ubuntu-latest
    needs: [remote-push-validation, guang-beam-compliance]
    if: always()
    steps:
      - name: Check all gates passed
        run: |
          echo "Remote Push Validation: ${{ needs.remote-push-validation.result }}"
          echo "Guang Beam Compliance: ${{ needs.guang-beam-compliance.result }}"
          if [ "${{ needs.remote-push-validation.result }}" = "success" ]; then
            echo "✅ 远程推送检测 — 通过"
          else
            echo "❌ 远程推送检测 — 未通过"
          fi
          if [ "${{ needs.guang-beam-compliance.result }}" = "success" ]; then
            echo "✅ 圈梁五道箍合规检查 — 通过"
          else
            echo "❌ 圈梁五道箍合规检查 — 未通过"
          fi
      - name: Final gate result
        run: |
          if [ "${{ needs.remote-push-validation.result }}" = "success" ] && \
             [ "${{ needs.guang-beam-compliance.result }}" = "success" ]; then
            echo "🎉 ALL GATES PASSED"
          else
            echo "⚠️  Some gates did not pass — manual review required"
          fi
