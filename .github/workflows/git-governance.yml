name: Git Governance

on:
  push:
    branches:
      - main
      - master
      - 'feature/**'
      - 'fix/**'
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  commit-message-lint:
    name: Commit Message Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate pushed commit messages
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"

          if [[ "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            COMMITS=$(git rev-list --max-count=20 "$HEAD")
          else
            COMMITS=$(git rev-list "$BASE..$HEAD")
          fi

          for commit in $COMMITS; do
            git log -1 --pretty=%B "$commit" | bash scripts/commit-lint.sh
          done

      - name: Validate PR title
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          TITLE='${{ github.event.pull_request.title }}'
          printf '%s\n' "$TITLE" | bash scripts/commit-lint.sh

  # в”Ђв”Ђ Gate6-C2: иїњзЁ‹жЋЁйЂЃз¦Ѓд»¤жЈЂжµ‹ в”Ђв”Ђ
  remote-push-detect:
    name: рџ”Њ Gate6-C2 Remote Push Detection
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect remote push
        shell: bash
        run: |
          set -euo pipefail
          echo "рџџЎ Gate6-C2: CI push event detected"
          echo "  ref: ${GITHUB_REF}"
          echo "  actor: ${GITHUB_ACTOR}"
          echo ""
          echo "STATUS=push_detected"
          echo "PUSH_REF=${GITHUB_REF}"
          echo "RUN_ID=${GITHUB_RUN_ID}"
