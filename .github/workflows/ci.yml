# ═══════════════════════════════════════════════════════════════
# M5 Monorepo CI Pipeline — V23 Phase 0
#
# 触发: push 到 main/tree/* + PR 到 main
# Node 20 + pnpm 10 + Turbo Cache
#
# 【圈梁五道箍】
# ① TSC通过 → ② 测试存在 → ③ 圈梁表更新 → ④ PRD标记 → ⑤ 知识赋能
#
# 【三大职能】
#  Job1 Lint & TypeCheck  — 全量类型检查
#  Job2 Unit Tests        — API 核心模块 + 前端页面测试
#  Job3 E2E L0 链        — 纯代码级 5 条 L0 关键链
# ═══════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main, tree/*]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'memory/**'
      - '.trae/**'
      - 'patterns/**'
      - 'anti-patterns/**'
      - 'zhishiku/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'memory/**'
      - '.trae/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NODE_VERSION: '20'
  PNPM_VERSION: '10'
  TURBO_TELEMETRY_DISABLED: 1

jobs:

  # ──────────────────────────────────────────────────────────
  # Job 1: TypeScript 类型检查 + ESLint lint
  # ──────────────────────────────────────────────────────────
  typecheck:
    name: 🏗 TypeCheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Turbo typecheck
        run: pnpm turbo typecheck
        env:
          TURBO_CACHE: rw
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

  # ──────────────────────────────────────────────────────────
  # Job 2: 单元测试 — API 核心模块 (vitest) + 前端页面测试
  # ──────────────────────────────────────────────────────────
  test:
    name: 🧪 Unit Tests
    needs: [typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Turbo test (all workspaces)
        run: pnpm turbo test
        env:
          TURBO_CACHE: rw
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

  # ──────────────────────────────────────────────────────────
  # Job 2.5: API 启动日志基线 + 最小 HTTP 边界
  # ──────────────────────────────────────────────────────────
  startup-baseline:
    name: 🚦 API Startup Baseline
    needs: [typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify local API startup baseline
        run: pnpm verify:api:startup-baseline

  # ──────────────────────────────────────────────────────────
  # Job 3: L0 级 E2E 关键链 (纯代码级, 不启动服务/浏览器)
  #   cashier    — 收银 POS 最小闭环     (*跳过*: 需 Playwright 浏览器)
  #   payment    — 结算金额链            (*跳过*: 需 Playwright 浏览器)
  #   refund     — 退款全流程            ✅ node:test 内存态
  #   reconcil.  — 财务对账              ✅ node:test 内存态
  #   tenant     — 多租户 RLS 隔离       ✅ node:test 内存态
  #
  # Playwright 2 条链 (cashier/payment) 需浏览器环境,
  # 保留在此仅做占位标记, 后续可在 with-browser CI 中启用。
  # ──────────────────────────────────────────────────────────
  e2e-l0:
    name: 🔗 E2E L0 Chains
    needs: [typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 链 18: 退款全流程 ──
      - name: 🔄 Refund chain (L0)
        working-directory: e2e/tests
        run: node --import tsx --test cross-module-chain18-refund-full-flow.test.ts

      # ── 链 33: 财务对账/调账 ──
      - name: 📊 Reconciliation chain (L0)
        working-directory: apps/admin-web/app/__e2e__
        run: node --import tsx --test cross-module-journey-33-admin-api-storefront-mobile-finance-reconciliation.test.ts

      # ── 链 31: 多租户 RLS 隔离 ──
      - name: 🏢 Tenant RLS chain (L0)
        working-directory: apps/admin-web/app/__e2e__
        run: node --import tsx --test cross-module-journey-31-admin-api-storefront-mobile-rls-multitenant.test.ts
