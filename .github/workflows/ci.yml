# ═══════════════════════════════════════════════════════════════
# M5 Monorepo CI Pipeline
#
# 触发: push 到 main + PR 到 main
# 职责:
#   - 依赖缓存 (pnpm 缓存 + Turbo 缓存)
#   - TypeScript 类型检查 (通过 turbo typecheck, 并行 7 apps)
#   - 单元测试 (storefront-web, admin-web, api)
#   - 跳过 Docker 构建
# ═══════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'memory/**'
      - '.trae/**'
      - 'patterns/**'
      - 'anti-patterns/**'
      - 'zhishiku/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'memory/**'
      - '.trae/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 10
  NODE_VERSION: 22
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  typecheck-test:
    name: TypeCheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # ── Setup Node + pnpm ──────────────────────────────────
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Step 2: TypeScript type checking (parallel across all apps) ──
      - name: Turbo typecheck
        run: pnpm turbo typecheck
        env:
          TURBO_CACHE: rw
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}

      # ── Step 3: Storefront page tests ──────────────────────
      - name: Storefront page tests
        working-directory: apps/storefront-web
        run: |
          find app -type f -name 'page.test.ts' \
            | sort \
            | xargs -n 15 node --import tsx --test

      # ── Step 4: Admin page tests (with happy-dom test setup) ──
      - name: Admin page tests
        working-directory: apps/admin-web
        run: |
          find app -type f \( -name '*.test.ts' -o -name '*.test.tsx' \) \
            | sort \
            | xargs -n 15 node --import tsx --import ./.test-setup.mjs --test

      # ── Step 5: API vitest tests ──────────────────────────
      - name: API vitest tests
        working-directory: apps/api
        run: pnpm vitest run
