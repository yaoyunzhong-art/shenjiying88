# ═══════════════════════════════════════════════════════════════
# M5 Monorepo CI Pipeline
#
# 触发条件: push 到 main/develop 或 PR 到 main/develop
# 职责:
#   - 依赖缓存 (pnpm)
#   - Lint + TypeScript 类型检查
#   - 单元测试 + 集成测试
#   - 构建所有 apps 和 packages
#   - Docker 镜像构建 (仅 main)
# ═══════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'memory/**'
      - '.trae/**'
      - 'patterns/**'
      - 'anti-patterns/**'
      - 'zhishiku/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'memory/**'
      - '.trae/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 10.14.0
  NODE_VERSION: 22
  TURBO_TELEMETRY_DISABLED: 1

jobs:

  # ─── 1. Lint & TypeCheck ──────────────────────────────
  lint:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @m5/api prisma:generate

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: TypeCheck
        run: pnpm typecheck
        continue-on-error: true

  # ─── 2. Build ─────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @m5/api prisma:generate

      - name: Build
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            apps/api/dist
            apps/admin-web/.next
            apps/storefront-web/.next
            apps/tob-web/.next
          retention-days: 1

  # ─── 3. Test ──────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: m5
          POSTGRES_PASSWORD: m5_test
          POSTGRES_DB: m5_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U m5 -d m5_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @m5/api prisma:generate

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://m5:m5_test@localhost:5432/m5_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-jwt-secret
          NODE_ENV: test

  # ─── 4. Docker Build (仅 main 分支) ──────────────────
  docker:
    name: Docker Build
    if: github.ref == 'refs/heads/main'
    needs: [lint, build, test]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api
            target: api-prod
            context: .
          - name: admin-web
            target: admin-prod
            context: .
          - name: storefront-web
            target: storefront-prod
            context: .
          - name: tob-web
            target: tob-prod
            context: .

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          target: ${{ matrix.service.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
